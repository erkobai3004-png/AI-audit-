<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сессия аяқталды</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 2.5rem;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    .icon {
      width: 56px;
      height: 56px;
      background: #f5f5f5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      color: #111;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    button {
      width: 100%;
      padding: 10px 0;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    button:hover { opacity: 0.85; }
  </style>
</head>

<body data-site="oprosnik">
  <div class="card">
    <div class="icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
           stroke="#888" stroke-width="1.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>

    <h1>Сессия аяқталды</h1>
    <p>Жалғастыру үшін бетті жаңартыңыз</p>

    <button onclick="clickButton('refresh_clicked'); setTimeout(() => location.reload(), 300);">
      Жаңарту
    </button>
  </div>

  <script src="/static/tracker.js"></script>
</body>
</html>
